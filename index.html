<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Discord-like Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #202225;
      color: #dcddde;
      height: 100vh;
      display: flex;
    }
    .servers {
      width: 70px;
      background: #202225;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-right: 1px solid #111;
    }
    .server-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      user-select: none;
    }
    .server-icon:hover { border-radius: 30%; }

    .main {
      flex: 1;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #2f3136;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #232427;
    }
    .sidebar-header {
      padding: 10px;
      border-bottom: 1px solid #232427;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
    }
    .tab {
      flex: 1;
      padding: 4px 6px;
      font-size: 12px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      background: #202225;
      color: #b9bbbe;
    }
    .tab.active { background: #36393f; color: #fff; }

    .friends-header-row {
      padding: 6px 10px 0;
      font-size: 11px;
      text-transform: uppercase;
      color: #72767d;
    }
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    .item {
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }
    .item:hover { background: #3a3c42; }
    .item span.name { font-weight: 500; }

    .add-friend {
      padding: 8px 10px;
      border-top: 1px solid #232427;
    }
    .add-friend input {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: none;
      outline: none;
      font-size: 13px;
      background: #202225;
      color: #dcddde;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #36393f;
    }

    .channel-header {
      height: 48px;
      padding: 0 12px;
      border-bottom: 1px solid #202225;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .channel-title {
      font-weight: 600;
    }
    .call-buttons button {
      margin-left: 6px;
      background: #202225;
      border: none;
      color: #b9bbbe;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .call-buttons button:hover { background: #3a3c42; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 0;
    }
    .message {
      margin-bottom: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      position: relative;
    }
    .message:hover { background: rgba(79,84,92,0.3); }
    .message-header {
      font-size: 13px;
      margin-bottom: 2px;
    }
    .author { font-weight: 600; margin-right: 6px; }
    .time { font-size: 11px; color: #72767d; }
    .text { font-size: 14px; }

    .msg-actions {
      position: absolute;
      top: 0;
      right: 4px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.1s;
      font-size: 10px;
    }
    .message:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      background: #202225;
      border-radius: 3px;
      padding: 1px 4px;
      cursor: pointer;
      color: #b9bbbe;
    }
    .msg-action-btn:hover { background: #4f545c; color: #fff; }

    .pinned {
      background: rgba(250, 166, 26, 0.1);
      border-left: 3px solid #faa61a;
    }

    .input-bar {
      padding: 10px 12px 12px;
      border-top: 1px solid #202225;
    }
    .input-bar input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #40444b;
      color: #dcddde;
      font-size: 14px;
    }
    .status-bar {
      padding: 4px 10px;
      font-size: 11px;
      color: #72767d;
    }
  </style>
</head>
<body>
  <div class="servers">
    <div class="server-icon" id="homeBtn">D</div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Friends & DMs</span>
        <button id="newGroupBtn" style="background:#5865f2;border:none;color:#fff;font-size:11px;border-radius:3px;padding:2px 6px;cursor:pointer;">+ Group</button>
      </div>

      <div class="tabs">
        <div class="tab active" id="friendsTab">Friends</div>
        <div class="tab" id="dmsTab">DMs</div>
      </div>

      <div class="friends-header-row" id="friendsHeader">All Friends</div>
      <div class="list" id="listContainer"></div>

      <div class="add-friend" id="addFriendArea">
        <input id="addFriendInput" placeholder="Add Friend: username#1234" />
      </div>

      <div style="padding:8px 10px;border-top:1px solid #232427;font-size:12px;background:#202225;">
        <div style="margin-bottom:4px;font-size:11px;text-transform:uppercase;color:#72767d;">Your Profile</div>
        <input id="myNameInput" placeholder="Your name" style="width:100%;margin-bottom:4px;padding:4px 6px;border-radius:4px;border:none;outline:none;background:#18191c;color:#dcddde;font-size:12px;" />
        <input id="myTagInput" placeholder="Tag (e.g. 1234)" style="width:100%;margin-bottom:4px;padding:4px 6px;border-radius:4px;border:none;outline:none;background:#18191c;color:#dcddde;font-size:12px;" />
        <button id="saveProfileBtn" style="width:100%;background:#5865f2;border:none;color:#fff;font-size:12px;border-radius:4px;padding:4px 0;cursor:pointer;margin-bottom:4px;">Save Username</button>
        <div style="font-size:11px;color:#b9bbbe;">Share this with friends: <span id="myFullId">you#0001</span></div>
      </div>
    </div>

    <div class="content">
      <div class="channel-header">
        <div class="channel-title" id="channelTitle">Select a friend or DM</div>
        <div class="call-buttons">
          <button id="voiceCallBtn">📞 Voice</button>
          <button id="videoCallBtn">📹 Video</button>
          <button id="screenShareBtn">🖥 Screen</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="status-bar" id="statusBar">No call active · Overlay (simulated) shows who is talking while you "game".</div>

      <div class="input-bar">
        <input id="messageInput" placeholder="Message #friends-or-dm" />
      </div>
    </div>
  </div>

  <script>
    const me = { id: 'me', name: 'You', tag: '0001' };

    const state = {
      friends: [
        { id: '1', name: 'Alice', tag: 'alice#1234' },
        { id: '2', name: 'Bob', tag: 'bob#5678' },
        { id: '3', name: 'Charlie', tag: 'charlie#9999' },
      ],
      conversations: {},
      activeConvId: null,
      activeTab: 'friends',
      callStatus: 'No call active',
      pinnedByConv: {},
    };

    function convIdForDM(friendId) { return 'dm_' + friendId; }

    function getOrCreateDM(friend) {
      const id = convIdForDM(friend.id);
      if (!state.conversations[id]) {
        state.conversations[id] = {
          id,
          type: 'dm',
          name: friend.name,
          members: [me.id, friend.id],
          messages: [],
        };
      }
      return state.conversations[id];
    }

    function createGroupDM(selectedFriendIds) {
      const id = 'group_' + Date.now();
      const name = 'Group with ' + selectedFriendIds.map(id => state.friends.find(f => f.id === id)?.name || 'Friend').join(', ');
      const conv = { id, type: 'group', name, members: [me.id, ...selectedFriendIds], messages: [] };
      state.conversations[id] = conv;
      return conv;
    }

    const friendsTab = document.getElementById('friendsTab');
    const dmsTab = document.getElementById('dmsTab');
    const listContainer = document.getElementById('listContainer');
    const friendsHeader = document.getElementById('friendsHeader');
    const addFriendArea = document.getElementById('addFriendArea');
    const addFriendInput = document.getElementById('addFriendInput');
    const messagesEl = document.getElementById('messages');
    const channelTitle = document.getElementById('channelTitle');
    const messageInput = document.getElementById('messageInput');
    const statusBar = document.getElementById('statusBar');
    const newGroupBtn = document.getElementById('newGroupBtn');

    const myNameInput = document.getElementById('myNameInput');
    const myTagInput = document.getElementById('myTagInput');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const myFullIdSpan = document.getElementById('myFullId');

    function updateMyIdDisplay() {
      myFullIdSpan.textContent = `${me.name}#${me.tag}`;
    }

    function renderSidebar() {
      listContainer.innerHTML = '';
      if (state.activeTab === 'friends') {
        friendsHeader.textContent = 'All Friends';
        addFriendArea.style.display = 'block';
        const frag = document.createDocumentFragment();
        state.friends.forEach(fr => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<span class="name">${fr.name}</span><span style="font-size:11px;color:#72767d;">${fr.tag}</span>`;
          item.onclick = () => { const dm = getOrCreateDM(fr); setActiveConversation(dm.id); };
          frag.appendChild(item);
        });
        listContainer.appendChild(frag);
      } else {
        friendsHeader.textContent = 'Direct Messages';
        addFriendArea.style.display = 'none';
        const frag = document.createDocumentFragment();
        Object.values(state.conversations).forEach(conv => {
          const item = document.createElement('div');
          item.className = 'item';
          let label = conv.name;
          if (conv.type === 'group') label += ' (Group)';
          item.innerHTML = `<span class="name">${label}</span>`;
          item.onclick = () => setActiveConversation(conv.id);
          frag.appendChild(item);
        });
        listContainer.appendChild(frag);
      }
    }

    function setActiveConversation(id) {
      state.activeConvId = id;
      const conv = state.conversations[id];
      if (!conv) return;
      channelTitle.textContent = conv.type === 'dm' ? `@${conv.name}` : conv.name;
      messageInput.placeholder = conv.type === 'dm' ? `Message @${conv.name}` : `Message ${conv.name}`;
      renderMessages();
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      const conv = state.conversations[state.activeConvId];
      if (!conv) return;
      const pinnedId = state.pinnedByConv[conv.id];
      const frag = document.createDocumentFragment();
      conv.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message';
        if (msg.id === pinnedId) div.classList.add('pinned');
        const header = document.createElement('div');
        header.className = 'message-header';
        header.innerHTML = `<span class="author">${msg.author}</span><span class="time">${msg.time}</span>`;
        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = msg.text;
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        const editBtn = document.createElement('div');
        editBtn.className = 'msg-action-btn';
        editBtn.textContent = 'Edit';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          const newText = prompt('Edit message:', msg.text);
          if (newText !== null) { msg.text = newText; renderMessages(); }
        };
        const delBtn = document.createElement('div');
        delBtn.className = 'msg-action-btn';
        delBtn.textContent = 'Delete';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          conv.messages = conv.messages.filter(m => m.id !== msg.id);
          renderMessages();
        };
        const pinBtn = document.createElement('div');
        pinBtn.className = 'msg-action-btn';
        pinBtn.textContent = msg.id === pinnedId ? 'Unpin' : 'Pin';
        pinBtn.onclick = (e) => {
          e.stopPropagation();
          state.pinnedByConv[conv.id] = msg.id === pinnedId ? null : msg.id;
          renderMessages();
        };
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        actions.appendChild(pinBtn);
        div.appendChild(header);
        div.appendChild(text);
        div.appendChild(actions);
        frag.appendChild(div);
      });
      messagesEl.appendChild(frag);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessageToActive(text, authorName) {
      const conv = state.conversations[state.activeConvId];
      if (!conv) return;
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      conv.messages.push({
        id: 'm' + Date.now() + Math.random().toString(16).slice(2),
        author: authorName,
        text,
        time: timeStr,
      });
      renderMessages();
    }

    friendsTab.onclick = () => { state.activeTab = 'friends'; friendsTab.classList.add('active'); dmsTab.classList.remove('active'); renderSidebar(); };
    dmsTab.onclick = () => { state.activeTab = 'dms'; dmsTab.classList.add('active'); friendsTab.classList.remove('active'); renderSidebar(); };

    addFriendInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const value = addFriendInput.value.trim();
        if (!value) return;
        const [name, tagPart] = value.split('#');
        const id = String(Date.now());
        const tag = tagPart ? value : name + '#0000';
        state.friends.push({ id, name: name || value, tag });
        addFriendInput.value = '';
        renderSidebar();
      }
    });

    messageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const text = messageInput.value.trim();
        if (!text) return;
        addMessageToActive(text, `${me.name}`);
        messageInput.value = '';
      }
    });

    newGroupBtn.onclick = () => {
      const ids = prompt('Enter friend IDs for group DM (comma separated, e.g. 1,2,3).\nAvailable: ' + state.friends.map(f => `${f.name} [${f.id}]`).join(', '));
      if (!ids) return;
      const selected = ids.split(',').map(s => s.trim()).filter(Boolean);
      if (!selected.length) return;
      const conv = createGroupDM(selected);
      state.activeTab = 'dms';
      friendsTab.classList.remove('active');
      dmsTab.classList.add('active');
      renderSidebar();
      setActiveConversation(conv.id);
    };

    const voiceBtn = document.getElementById('voiceCallBtn');
    const videoBtn = document.getElementById('videoCallBtn');
    const screenBtn = document.getElementById('screenShareBtn');

    voiceBtn.onclick = () => { state.callStatus = 'In Voice Call (simulated room)'; updateStatus(); };
    videoBtn.onclick = () => { state.callStatus = 'In Video Call (simulated)'; updateStatus(); };
    screenBtn.onclick = () => { state.callStatus = 'Screen Sharing (simulated)'; updateStatus(); };

    function updateStatus() {
      statusBar.textContent = state.callStatus + ' · Overlay (simulated) shows who is talking.';
    }

    document.getElementById('homeBtn').onclick = () => {
      state.activeConvId = null;
      channelTitle.textContent = 'Select a friend or DM';
      messageInput.placeholder = 'Message #friends-or-dm';
      messagesEl.innerHTML = '';
    };

    saveProfileBtn.onclick = () => {
      const name = myNameInput.value.trim() || 'You';
      const tag = myTagInput.value.trim() || '0001';
      me.name = name;
      me.tag = tag;
      updateMyIdDisplay();
    };

    renderSidebar();
    updateMyIdDisplay();
    if (state.friends[0]) { const dm = getOrCreateDM(state.friends[0]); setActiveConversation(dm.id); }
  </script>
</body>
</html>
