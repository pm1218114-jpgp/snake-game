<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App with Emojis</title>
</head>
<body>
    <h1>Chat App</h1>
    <input type="text" id="username" placeholder="Enter your username" />
    <input type="text" id="friendUsername" placeholder="Enter friend's username" />
    <button onclick="startChat()">Chat</button>

    <div id="chatWindow" style="display:none;">
        <h2>Chat with <span id="currentFriend"></span></h2>
        <div id="messages"></div>
        <input type="text" id="messageInput" placeholder="Type your message or emoji" />
        <button onclick="sendMessage()">Send</button>
        <button onclick="insertEmoji('😊')">😊</button>
        <button onclick="insertEmoji('👍')">👍</button>
    </div>

    <script>
        function startChat() {
            const friendUsername = document.getElementById('friendUsername').value;
            document.getElementById('currentFriend').innerText = friendUsername;
            document.getElementById('chatWindow').style.display = 'block';
        }

        function sendMessage() {
            const message = document.getElementById('messageInput').value;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML += `<p>${message}</p>`;
            document.getElementById('messageInput').value = '';
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;  // Append emoji to the message input
        }
    </script>
</body>
</html>
