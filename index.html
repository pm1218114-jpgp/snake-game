<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4-Way Split-Screen Slither</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .viewport { position: relative; width: 50%; height: 100%; border-right: 2px solid #444; overflow: hidden; }
        canvas { display: block; background: #1a1a1a; }
        .ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 5px; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="viewport">
            <div class="ui"><b>P1 (WASD)</b><br>Score: <span id="score1">0</span></div>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="viewport">
            <div class="ui"><b>P2 (Arrows)</b><br>Score: <span id="score2">0</span></div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <script>
        const c1 = document.getElementById('canvas1');
        const c2 = document.getElementById('canvas2');
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');

        const WORLD_SIZE = 3000;
        const keys = {};

        function resize() {
            c1.width = c2.width = window.innerWidth / 2;
            c1.height = c2.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        class Snake {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y;
                this.color = color;
                this.controls = controls;
                this.targetAngle = 0; // Current direction in radians
                this.speed = 5;
                this.radius = 12;
                this.segments = Array(25).fill({x, y});
                this.score = 0;
            }

            update() {
                // Fixed Direction Controls
                if (keys[this.controls.up]) this.targetAngle = -Math.PI / 2;
                if (keys[this.controls.down]) this.targetAngle = Math.PI / 2;
                if (keys[this.controls.left]) this.targetAngle = Math.PI;
                if (keys[this.controls.right]) this.targetAngle = 0;

                // Move head based on angle
                this.x += Math.cos(this.targetAngle) * this.speed;
                this.y += Math.sin(this.targetAngle) * this.speed;

                // Simple World boundaries
                this.x = Math.max(0, Math.min(WORLD_SIZE, this.x));
                this.y = Math.max(0, Math.min(WORLD_SIZE, this.y));

                // Trail logic: Add head, remove tail
                this.segments.unshift({x: this.x, y: this.y});
                const maxLength = 25 + Math.floor(this.score / 5);
                if (this.segments.length > maxLength) this.segments.pop();
            }

            draw(ctx, camX, camY) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.radius * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x - camX, this.segments[0].y - camY);
                // Draw path through segments
                for(let i=1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x - camX, this.segments[i].y - camY);
                }
                ctx.stroke();

                // Draw "Head" circle
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x - camX, this.y - camY, this.radius * 0.6, 0, Math.PI*2);
                ctx.fill();
            }
        }

        const p1 = new Snake(500, 500, '#4CAF50', {up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD'});
        const p2 = new Snake(1000, 1000, '#2196F3', {up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight'});
        
        let food = Array(150).fill(0).map(() => ({
            x: Math.random() * WORLD_SIZE, 
            y: Math.random() * WORLD_SIZE, 
            r: Math.random() * 5 + 3,
            c: `hsl(${Math.random()*360}, 100%, 60%)`
        }));

        function checkFood(player, scoreId) {
            food.forEach((f, i) => {
                if (Math.hypot(player.x - f.x, player.y - f.y) < player.radius + f.r) {
                    player.score += 10;
                    document.getElementById(scoreId).innerText = player.score;
                    // Respawn food elsewhere
                    food[i] = { x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, r: Math.random()*5+3, c: `hsl(${Math.random()*360}, 100%, 60%)` };
                }
            });
        }

        function renderView(ctx, player, canvas) {
            // Camera follows player center
            const camX = player.x - canvas.width / 2;
            const camY = player.y - canvas.height / 2;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Subtle Grid
            ctx.strokeStyle = '#252525';
            ctx.lineWidth = 2;
            for(let x=0; x<=WORLD_SIZE; x+=100) {
                ctx.beginPath(); ctx.moveTo(x-camX, 0-camY); ctx.lineTo(x-camX, WORLD_SIZE-camY); ctx.stroke();
            }
            for(let y=0; y<=WORLD_SIZE; y+=100) {
                ctx.beginPath(); ctx.moveTo(0-camX, y-camY); ctx.lineTo(WORLD_SIZE-camX, y-camY); ctx.stroke();
            }

            // Draw All Food
            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x - camX, f.y - camY, f.r, 0, Math.PI*2); ctx.fill();
            });

            // Draw both snakes in this view
            p1.draw(ctx, camX, camY);
            p2.draw(ctx, camX, camY);
        }

        function loop() {
            p1.update();
            p2.update();
            checkFood(p1, 'score1');
            checkFood(p2, 'score2');

            renderView(ctx1, p1, c1);
            renderView(ctx2, p2, c2);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
