<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Fix: No Black Screen</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; text-shadow: 1px 1px #000; z-index: 100; }
    </style>
</head>
<body>
    <div id="ui">WASD to Move | Click to Lock | Shift+Click to Build | Left-Click to Mine</div>
    <div id="crosshair"></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com" } }</script>
    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        // Lights are crucial; without them, everything is black
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(hemiLight);

        // --- 3. MATERIALS ---
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const mats = [
            new THREE.MeshLambertMaterial({ color: 0x567d46 }), // Grass
            new THREE.MeshLambertMaterial({ color: 0x8b4513 }), // Dirt
            new THREE.MeshLambertMaterial({ color: 0x808080 })  // Stone
        ];

        // --- 4. WORLD GENERATION ---
        const blocks = [];
        function generateWorld() {
            // Smaller initial area to ensure fast loading
            for (let x = -10; x < 10; x++) {
                for (let z = -10; z < 10; z++) {
                    const h = Math.floor(Math.sin(x * 0.2) * 2 + 5);
                    for (let y = 0; y < h; y++) {
                        const mat = (y === h - 1) ? mats[0] : (y > h - 3 ? mats[1] : mats[2]);
                        const mesh = new THREE.Mesh(boxGeo, mat);
                        mesh.position.set(x, y, z);
                        scene.add(mesh);
                        blocks.push(mesh);
                    }
                }
            }
        }
        generateWorld();

        // --- 5. PLAYER MOVEMENT ---
        camera.position.set(0, 10, 10); // Start high to avoid spawning inside blocks
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.body.addEventListener('click', () => document.body.requestPointerLock());

        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(blocks);
            if (intersects.length > 0) {
                const hit = intersects[0];
                if (e.shiftKey) { // Build
                    const b = new THREE.Mesh(boxGeo, mats[0]);
                    b.position.copy(hit.object.position).add(hit.face.normal);
                    scene.add(b); blocks.push(b);
                } else { // Mine
                    scene.remove(hit.object);
                    blocks.splice(blocks.indexOf(hit.object), 1);
                }
            }
        });

        // --- 6. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.1;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);
            if (keys['Space']) camera.position.y += 0.1;
            if (keys['ShiftLeft']) camera.position.y -= 0.1;

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
