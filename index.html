<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Audio Volume Booster</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input[type="range"] { width: 100%; margin: 20px 0; cursor: pointer; }
        .warning { color: #d9534f; font-size: 0.75rem; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Volume Booster</h2>
    <p>Upload a file to boost its audio:</p>
    <input type="file" id="audioLoader" accept="audio/*,video/*">
    <br><br>
    <audio id="player" controls></audio>
    <p>Current Boost: <span id="display">100</span>%</p>
    <input type="range" id="booster" min="100" max="600" value="100">
    <div class="warning">⚠️ High boost may cause clipping/distortion.</div>
</div>

<script>
    // 1. Initialize Web Audio API components
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const gainNode = ctx.createGain();
    gainNode.connect(ctx.destination);

    const player = document.getElementById('player');
    const booster = document.getElementById('booster');
    const display = document.getElementById('display');
    const loader = document.getElementById('audioLoader');

    let source = null;

    // 2. Handle file loading
    loader.onchange = function() {
        const file = URL.createObjectURL(this.files[0]);
        player.src = file;

        // Connect player to the gain node only once
        if (!source) {
            source = ctx.createMediaElementSource(player);
            source.connect(gainNode);
        }
    };

    // 3. Control the gain (amplification)
    booster.oninput = function() {
        const val = this.value;
        display.innerText = val;
        
        // 100% = 1.0 gain, 600% = 6.0 gain
        gainNode.gain.value = val / 100;

        // Resume context if browser blocked it
        if (ctx.state === 'suspended') ctx.resume();
    };
</script>

</body>
</html>
