<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Tag: Hunter vs Survivor</title>
    <style>
        body { background: #1a1a1a; color: #eee; text-align: center; font-family: 'Segoe UI', sans-serif; }
        canvas { border: 4px solid #444; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: center; gap: 50px; font-size: 20px; margin-top: 10px; }
        .hunter { color: #2ecc71; font-weight: bold; }
        .survivor { color: #e74c3c; font-weight: bold; }
        .info { color: #f1c40f; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Snake Tag</h1>
    <div class="stats">
        <div id="p1Status" class="hunter">P1: HUNTER</div>
        <div id="p2Status" class="survivor">P2: SURVIVOR (Blocks: 1/10)</div>
    </div>
    <canvas id="game" width="600" height="400"></canvas>
    <p class="info">Hunter (Arrows) tags Survivor (WASD) to remove blocks. Survivor eats 10 apples to win!</p>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const grid = 20;
        let count = 0;
        let p1IsHunter = true;

        let hunter = { x: 40, y: 40, dx: grid, dy: 0, cells: [], maxCells: 5, color: '#2ecc71' };
        let survivor = { x: 540, y: 340, dx: -grid, dy: 0, cells: [], maxCells: 2, color: '#e74c3c' };
        let apples = [{ x: 300, y: 200 }];

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function spawnApple() {
            apples.push({
                x: getRandomInt(0, canvas.width / grid) * grid,
                y: getRandomInt(0, canvas.height / grid) * grid
            });
        }

        // Spawn apple every 5 seconds
        setInterval(spawnApple, 5000);

        function resetRound(winner) {
            alert(winner + " Wins! Roles swapping...");
            p1IsHunter = !p1IsHunter;
            hunter.maxCells = 5;
            survivor.maxCells = 2;
            hunter.x = 40; hunter.y = 40; hunter.dx = grid; hunter.dy = 0; hunter.cells = [];
            survivor.x = 540; survivor.y = 340; survivor.dx = -grid; survivor.dy = 0; survivor.cells = [];
            apples = [{ x: 300, y: 200 }];
        }

        function updateUI() {
            const p1 = document.getElementById('p1Status');
            const p2 = document.getElementById('p2Status');
            if(p1IsHunter) {
                p1.className = 'hunter'; p1.innerHTML = "P1: HUNTER";
                p2.className = 'survivor'; p2.innerHTML = `P2: SURVIVOR (Size: ${survivor.maxCells}/10)`;
            } else {
                p2.className = 'hunter'; p2.innerHTML = "P2: HUNTER";
                p1.className = 'survivor'; p1.innerHTML = `P1: SURVIVOR (Size: ${hunter.maxCells}/10)`;
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 7) return; 
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            updateUI();

            let players = p1IsHunter ? { h: hunter, s: survivor } : { h: survivor, s: hunter };

            [hunter, survivor].forEach(snake => {
                snake.x += snake.dx;
                snake.y += snake.dy;

                if (snake.x < 0) snake.x = canvas.width - grid;
                else if (snake.x >= canvas.width) snake.x = 0;
                if (snake.y < 0) snake.y = canvas.height - grid;
                else if (snake.y >= canvas.height) snake.y = 0;

                snake.cells.unshift({x: snake.x, y: snake.y});
                if (snake.cells.length > snake.maxCells) snake.cells.pop();

                ctx.fillStyle = snake.color;
                snake.cells.forEach((cell) => {
                    ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
                    
                    // Survivor eats apple
                    apples.forEach((apple, index) => {
                        if (players.s.cells[0].x === apple.x && players.s.cells[0].y === apple.y) {
                            players.s.maxCells++;
                            apples.splice(index, 1);
                            if (players.s.maxCells >= 10) resetRound(p1IsHunter ? "Player 2" : "Player 1");
                        }
                    });
                });
            });

            // Hunter tags Survivor
            players.s.cells.forEach((sCell, index) => {
                if (players.h.cells[0].x === sCell.x && players.h.cells[0].y === sCell.y) {
                    if (players.s.maxCells > 1) {
                        players.s.maxCells--;
                        players.s.cells.pop();
                        // Brief teleport to prevent instant multi-hit
                        players.h.x = getRandomInt(0, 10) * grid; 
                    } else {
                        resetRound(p1IsHunter ? "Player 1" : "Player 2");
                    }
                }
            });

            ctx.fillStyle = '#f1c40f';
            apples.forEach(apple => ctx.fillRect(apple.x, apple.y, grid-1, grid-1));
        }

        document.addEventListener('keydown', e => {
            // P1: Arrows
            if (e.which === 37 && hunter.dx === 0) { hunter.dx = -grid; hunter.dy = 0; }
            else if (e.which === 38 && hunter.dy === 0) { hunter.dy = -grid; hunter.dx = 0; }
            else if (e.which === 39 && hunter.dx === 0) { hunter.dx = grid; hunter.dy = 0; }
            else if (e.which === 40 && hunter.dy === 0) { hunter.dy = grid; hunter.dx = 0; }
            // P2: WASD
            if (e.which === 65 && survivor.dx === 0) { survivor.dx = -grid; survivor.dy = 0; }
            else if (e.which === 87 && survivor.dy === 0) { survivor.dy = -grid; survivor.dx = 0; }
            else if (e.which === 68 && survivor.dx === 0) { survivor.dx = grid; survivor.dy = 0; }
            else if (e.which === 83 && survivor.dy === 0) { survivor.dy = grid; survivor.dx = 0; }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
