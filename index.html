<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Minecraft Clone</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">Left click: Mine | Right click: Place block | WASD: Move | Mouse: Look</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const controls = new PointerLockControls(camera, document.body);
    document.body.addEventListener('click', () => controls.lock());
    scene.add(controls.getObject());

    camera.position.set(0, 3, 5);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);
    const blocks = [];
    const blockMap = new Map();
    const blockSize = 1;

    const materials = {
      grass: new THREE.MeshLambertMaterial({ color: 0x55aa55 }),
      dirt: new THREE.MeshLambertMaterial({ color: 0x8b5a2b }),
      stone: new THREE.MeshLambertMaterial({ color: 0x888888 }),
      wood: new THREE.MeshLambertMaterial({ color: 0x775533 }),
      leaves: new THREE.MeshLambertMaterial({ color: 0x228833 })
    };

    function key(x, y, z) {
      return `${x},${y},${z}`;
    }

    function addBlock(x, y, z, type = 'grass') {
      const k = key(x, y, z);
      if (blockMap.has(k)) return;
      const geo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
      const mesh = new THREE.Mesh(geo, materials[type]);
      mesh.position.set(x, y, z);
      mesh.userData = { type, x, y, z };
      scene.add(mesh);
      blocks.push(mesh);
      blockMap.set(k, mesh);
    }

    function removeBlock(block) {
      const { x, y, z } = block.userData;
      scene.remove(block);
      blockMap.delete(key(x, y, z));
      const i = blocks.indexOf(block);
      if (i !== -1) blocks.splice(i, 1);
    }

    function generateTree(x, y, z) {
      for (let i = 1; i <= 3; i++) addBlock(x, y + i, z, 'wood');
      for (let dx = -1; dx <= 1; dx++) {
        for (let dz = -1; dz <= 1; dz++) {
          for (let dy = 3; dy <= 4; dy++) {
            if (!(dx === 0 && dz === 0 && dy === 3)) {
              addBlock(x + dx, y + dy, z + dz, 'leaves');
            }
          }
        }
      }
    }

    function generateWorld() {
      const size = 20;
      for (let x = -size; x < size; x++) {
        for (let z = -size; z < size; z++) {
          addBlock(x, 0, z, 'grass');
          addBlock(x, -1, z, 'dirt');
          addBlock(x, -2, z, 'stone');

          if (Math.random() < 0.10) {
            generateTree(x, 0, z);
          }
        }
      }
    }

    generateWorld();

    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);

    document.addEventListener('mousedown', (event) => {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(blocks);
      if (intersects.length === 0) return;

      const hit = intersects[0];
      const block = hit.object;

      if (event.button === 0) {
        removeBlock(block);
      } else if (event.button === 2) {
        const pos = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(0.5));
        const x = Math.round(pos.x);
        const y = Math.round(pos.y);
        const z = Math.round(pos.z);
        addBlock(x, y, z, 'stone');
      }
    });

    document.addEventListener('contextmenu', e => e.preventDefault());

    function animate() {
      requestAnimationFrame(animate);

      const speed = 0.1;
      if (controls.isLocked) {
        if (keys['KeyW']) controls.moveForward(speed);
        if (keys['KeyS']) controls.moveForward(-speed);
        if (keys['KeyA']) controls.moveRight(-speed);
        if (keys['KeyD']) controls.moveRight(speed);
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
