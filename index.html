<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Battle Deluxe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87ceeb;
    }
    canvas {
      display: block;
      background: linear-gradient(#8fd3ff, #dff6ff);
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,.45);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 420px;
      white-space: pre-line;
    }
    #crosshair {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
<div id="ui"></div>
<div id="crosshair"></div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const crosshair = document.getElementById('crosshair');

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener('resize', resize);
resize();

const keys = {};
const mouse = { x: innerWidth / 2, y: innerHeight / 2, down: false, right: false };

addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
});

addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  crosshair.style.left = mouse.x + 'px';
  crosshair.style.top = mouse.y + 'px';
});

addEventListener('mousedown', e => {
  if (e.button === 0) mouse.down = true;
  if (e.button === 2) mouse.right = true;
});

addEventListener('mouseup', e => {
  if (e.button === 0) mouse.down = false;
  if (e.button === 2) mouse.right = false;
});

addEventListener('contextmenu', e => e.preventDefault());

const TILE = 48;
const GRAVITY = 0.7;
const GROUND_Y = 560;
let cameraX = 0;
let gameMode = '1v1';
let roundActive = true;
let winnerText = '';
let buildType = 'wall';
let selectedSlot = 0;
let buildMaterial = 'wood';
let zoneTimer = 60 * 20;
let stormRadius = 2000;
let stormShrink = false;
let notifications = [];
let damageTexts = [];
let particles = [];
let lootDrops = [];
let editMode = false;
let showMap = false;
let creativeFreeBuild = false;
let elapsed = 0;

const materials = {
  wood: { color: '#b57f49', hp: 120 },
  brick: { color: '#b44d3a', hp: 180 },
  metal: { color: '#95a5b3', hp: 260 }
};

const weapons = {
  rifle: { name: 'Rifle', damage: 18, speed: 13, cooldown: 12, spread: 0.03, color: '#f1c40f' },
  shotgun: { name: 'Shotgun', damage: 10, speed: 11, cooldown: 32, spread: 0.22, pellets: 6, color: '#e67e22' },
  smg: { name: 'SMG', damage: 9, speed: 14, cooldown: 5, spread: 0.08, color: '#2ecc71' },
  sniper: { name: 'Sniper', damage: 55, speed: 19, cooldown: 55, spread: 0.005, color: '#9b59b6' },
  pickaxe: { name: 'Pickaxe', damage: 35, speed: 0, cooldown: 24, spread: 0, color: '#ffffff' }
};

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function notify(text) {
  notifications.push({ text, life: 180 });
}

function damageText(x, y, text, color = 'white') {
  damageTexts.push({ x, y, text, color, life: 60, vy: -0.6 });
}

function makeParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: rand(-3, 3),
      vy: rand(-3, 3),
      life: rand(20, 40),
      color
    });
  }
}

const world = {
  width: 5000,
  hills: [],
  platforms: [],
  decorations: []
};

for (let i = 0; i < 30; i++) {
  world.hills.push({ x: i * 220 + rand(-50, 50), w: rand(160, 320), h: rand(50, 140) });
}
for (let i = 0; i < 18; i++) {
  world.platforms.push({ x: 300 + i * 230, y: rand(320, 500), w: rand(120, 220), h: 18 });
}
for (let i = 0; i < 80; i++) {
  world.decorations.push({ x: rand(0, world.width), y: GROUND_Y, type: Math.random() > 0.5 ? 'tree' : 'rock' });
}

function createPlayer(x, y, color, ai = false) {
  return {
    x, y,
    w: 38,
    h: 58,
    vx: 0,
    vy: 0,
    speed: 4.5,
    jump: -13,
    grounded: false,
    crouching: false,
    sprinting: false,
    hp: 100,
    shield: 50,
    maxHp: 100,
    maxShield: 100,
    color,
    ai,
    facing: 1,
    onPlatform: null,
    weapon: 'rifle',
    cooldown: 0,
    inventory: ['rifle', 'shotgun', 'smg', 'pickaxe', 'mini'],
    ammo: { rifle: 999, shotgun: 60, smg: 180, sniper: 25 },
    materials: { wood: 150, brick: 120, metal: 100 },
    eliminations: 0,
    editing: false,
    reloading: 0,
    canDoubleJump: false,
    usedDoubleJump: false,
    angle: 0,
    name: ai ? 'Bot' : 'Player'
  };
}

const player = createPlayer(150, 200, '#1e90ff', false);
const enemies = [
  createPlayer(1200, 200, '#ff4d4d', true),
  createPlayer(1900, 200, '#ff8c42', true),
  createPlayer(2600, 200, '#d94dff', true)
];

enemies[0].weapon = 'shotgun';
enemies[1].weapon = 'smg';
enemies[2].weapon = 'sniper';

const bullets = [];
const builds = [];

function addLoot(x, y) {
  const items = ['mini', 'medkit', 'ammo', 'wood', 'brick', 'metal', 'sniper'];
  const item = items[Math.floor(Math.random() * items.length)];
  lootDrops.push({ x, y, w: 26, h: 26, item, bob: rand(0, Math.PI * 2) });
}

for (let i = 0; i < 20; i++) addLoot(rand(200, world.width - 200), rand(250, 520));

function rects(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function snap(n) {
  return Math.floor(n / TILE) * TILE;
}

function currentWeapon() {
  const slotItem = player.inventory[selectedSlot] || 'rifle';
  return weapons[slotItem] ? slotItem : 'rifle';
}

function switchSlot(index) {
  selectedSlot = clamp(index, 0, 4);
  const item = player.inventory[selectedSlot];
  if (weapons[item]) player.weapon = item;
}

addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === '1') { buildType = 'wall'; switchSlot(0); }
  if (k === '2') { buildType = 'ramp'; switchSlot(1); }
  if (k === '3') { buildType = 'floor'; switchSlot(2); }
  if (k === '4') { buildType = 'roof'; switchSlot(3); }
  if (k === '5') switchSlot(4);
  if (k === 'q') player.weapon = player.weapon === 'pickaxe' ? currentWeapon() : 'pickaxe';
  if (k === 'e') editNearestBuild();
  if (k === 'r') reloadWeapon(player);
  if (k === 'm') showMap = !showMap;
  if (k === 'z') creativeFreeBuild = !creativeFreeBuild;
  if (k === 'x') cycleMaterial();
  if (k === 'f') useConsumable();
  if (k === 'g') dropItem();
  if (k === 'b') cycleMode();
});

function cycleMode() {
  const list = ['1v1', 'Battle Royale', 'Party', 'Creative'];
  gameMode = list[(list.indexOf(gameMode) + 1) % list.length];
  notify('Mode: ' + gameMode);
}

function cycleMaterial() {
  const order = ['wood', 'brick', 'metal'];
  buildMaterial = order[(order.indexOf(buildMaterial) + 1) % order.length];
  notify('Material: ' + buildMaterial);
}

function getBuildPreview() {
  const px = snap(mouse.x + cameraX);
  const py = snap(mouse.y);
  return { x: px, y: py, w: TILE, h: TILE };
}

function placeBuild(type = buildType, who = player) {
  const preview = getBuildPreview();
  const mat = buildMaterial;
  if (!creativeFreeBuild && who.materials[mat] <= 0) {
    notify('No ' + mat);
    return;
  }
  for (const b of builds) {
    if (Math.abs(b.x - preview.x) < 2 && Math.abs(b.y - preview.y) < 2 && b.type === type) return;
  }
  const hp = materials[mat].hp;
  builds.push({
    x: preview.x,
    y: preview.y,
    w: TILE,
    h: TILE,
    type,
    material: mat,
    hp,
    maxHp: hp,
    edited: false,
    owner: who.ai ? 'enemy' : 'player'
  });
  if (!creativeFreeBuild) who.materials[mat] -= 10;
}

function editNearestBuild() {
  let nearest = null;
  let best = 9999;
  for (const b of builds) {
    const cx = b.x + b.w / 2;
    const cy = b.y + b.h / 2;
    const d = Math.hypot(cx - (player.x + player.w / 2), cy - (player.y + player.h / 2));
    if (d < best && d < 130) {
      best = d;
      nearest = b;
    }
  }
  if (nearest) {
    nearest.edited = !nearest.edited;
    notify(nearest.edited ? 'Edited structure' : 'Reset structure');
  }
}

function reloadWeapon(who) {
  if (who.weapon === 'pickaxe' || who.reloading > 0) return;
  who.reloading = 70;
  notify((who.ai ? 'Bot' : 'Reloading') + ' ' + who.weapon);
}

function useConsumable() {
  const item = player.inventory[selectedSlot];
  if (item === 'mini') {
    player.shield = clamp(player.shield + 25, 0, 100);
    player.inventory[selectedSlot] = 'rifle';
    notify('Used mini shield');
  }
  if (item === 'medkit') {
    player.hp = clamp(player.hp + 40, 0, 100);
    player.inventory[selectedSlot] = 'rifle';
    notify('Used medkit');
  }
}

function dropItem() {
  const item = player.inventory[selectedSlot];
  if (!item) return;
  lootDrops.push({ x: player.x, y: player.y, w: 26, h: 26, item, bob: 0 });
  player.inventory[selectedSlot] = 'rifle';
  notify('Dropped ' + item);
}

function fireWeapon(who, targetX, targetY) {
  if (who.cooldown > 0 || who.reloading > 0) return;
  const wep = weapons[who.weapon];
  if (!wep) return;
  if (who.weapon === 'pickaxe') {
    pickaxeAttack(who);
    who.cooldown = wep.cooldown;
    return;
  }
  if (who.ammo[who.weapon] !== undefined && who.ammo[who.weapon] <= 0) {
    reloadWeapon(who);
    return;
  }

  const startX = who.x + who.w / 2;
  const startY = who.y + who.h / 2;
  const angleBase = Math.atan2(targetY - startY, targetX - startX);
  const pellets = wep.pellets || 1;

  for (let i = 0; i < pellets; i++) {
    const spread = rand(-wep.spread, wep.spread);
    const angle = angleBase + spread;
    bullets.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * wep.speed,
      vy: Math.sin(angle) * wep.speed,
      damage: wep.damage,
      color: wep.color,
      owner: who,
      life: 90
    });
  }

  if (who.ammo[who.weapon] !== undefined) who.ammo[who.weapon]--;
  who.cooldown = wep.cooldown;
  makeParticles(startX, startY, wep.color, 5);
}

function pickaxeAttack(who) {
  for (let i = builds.length - 1; i >= 0; i--) {
    const b = builds[i];
    const d = Math.hypot((b.x + b.w / 2) - who.x, (b.y + b.h / 2) - who.y);
    if (d < 90) {
      b.hp -= weapons.pickaxe.damage;
      makeParticles(b.x + b.w / 2, b.y + b.h / 2, materials[b.material].color, 8);
      damageText(b.x, b.y, '-' + weapons.pickaxe.damage, '#fff');
      if (b.hp <= 0) {
        builds.splice(i, 1);
        if (!who.ai) who.materials[b.material] += 20;
      }
      return;
    }
  }
  for (const target of enemies) {
    if (target.hp <= 0) continue;
    const d = Math.hypot((target.x + target.w / 2) - who.x, (target.y + target.h / 2) - who.y);
    if (d < 80) {
      hitPlayer(target, weapons.pickaxe.damage, who);
      return;
    }
  }
}

function hitPlayer(target, damage, attacker) {
  let dealt = damage;
  if (target.shield > 0) {
    const blocked = Math.min(target.shield, dealt);
    target.shield -= blocked;
    dealt -= blocked;
  }
  if (dealt > 0) target.hp -= dealt;
  damageText(target.x, target.y, '-' + damage, '#ff5555');
  makeParticles(target.x + target.w / 2, target.y + target.h / 2, '#ff0000', 8);
  if (target.hp <= 0) {
    target.hp = 0;
    attacker.eliminations++;
    addLoot(target.x, target.y);
    addLoot(target.x + 25, target.y);
    notify((attacker.ai ? 'Bot' : 'You') + ' eliminated ' + target.name);
  }
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    let removed = false;

    for (let j = builds.length - 1; j >= 0; j--) {
      const build = builds[j];
      if (build.edited) continue;
      if (pointInRect(b.x, b.y, build)) {
        build.hp -= b.damage;
        damageText(build.x, build.y, '-' + b.damage, materials[build.material].color);
        makeParticles(b.x, b.y, materials[build.material].color, 7);
        if (build.hp <= 0) {
          builds.splice(j, 1);
        }
        bullets.splice(i, 1);
        removed = true;
        break;
      }
    }
    if (removed) continue;

    const targets = [player, ...enemies];
    for (const target of targets) {
      if (target === b.owner || target.hp <= 0) continue;
      if (pointInRect(b.x, b.y, target)) {
        hitPlayer(target, b.damage, b.owner);
        bullets.splice(i, 1);
        removed = true;
        break;
      }
    }
    if (removed) continue;

    if (b.life <= 0 || b.x < 0 || b.x > world.width || b.y < 0 || b.y > canvas.height + 300) {
      bullets.splice(i, 1);
    }
  }
}

function landOnTop(entity, plat) {
  if (entity.vy >= 0 && entity.x + entity.w > plat.x && entity.x < plat.x + plat.w) {
    if (entity.y + entity.h <= plat.y + 18 && entity.y + entity.h + entity.vy >= plat.y) {
      entity.y = plat.y - entity.h;
      entity.vy = 0;
      entity.grounded = true;
      entity.onPlatform = plat;
    }
  }
}

function handleWorldCollision(entity) {
  entity.grounded = false;
  entity.onPlatform = null;

  if (entity.y + entity.h >= GROUND_Y) {
    entity.y = GROUND_Y - entity.h;
    entity.vy = 0;
    entity.grounded = true;
    entity.usedDoubleJump = false;
  }

  for (const plat of world.platforms) landOnTop(entity, plat);

  for (const b of builds) {
    let hitbox = { x: b.x, y: b.y, w: b.w, h: b.h };
    if (b.type === 'floor') hitbox = { x: b.x, y: b.y + 26, w: b.w, h: 16 };
    if (b.type === 'roof') hitbox = { x: b.x + 4, y: b.y + 10, w: b.w - 8, h: b.h - 10 };
    if (b.edited) hitbox = { x: b.x, y: b.y, w: b.w, h: 10 };
    if (rects(entity, hitbox)) {
      if (entity.vy >= 0 && entity.y + entity.h - entity.vy <= hitbox.y + 10) {
        entity.y = hitbox.y - entity.h;
        entity.vy = 0;
        entity.grounded = true;
        entity.usedDoubleJump = false;
      } else if (entity.vx > 0) {
        entity.x = hitbox.x - entity.w;
      } else if (entity.vx < 0) {
        entity.x = hitbox.x + hitbox.w;
      }
    }
  }
}

function updatePlayer() {
  player.crouching = !!keys['c'];
  player.sprinting = !!keys['shift'];
  player.h = player.crouching ? 38 : 58;
  player.speed = player.sprinting ? 6 : 4.5;
  player.vx = 0;

  if (keys['a']) { player.vx = -player.speed; player.facing = -1; }
  if (keys['d']) { player.vx = player.speed; player.facing = 1; }

  if (keys[' '] && player.grounded) {
    player.vy = player.jump;
    player.grounded = false;
  } else if (keys[' '] && !player.grounded && !player.usedDoubleJump && gameMode === 'Creative') {
    player.vy = player.jump * 0.9;
    player.usedDoubleJump = true;
  }

  player.x += player.vx;
  player.y += player.vy;
  player.vy += GRAVITY;

  handleWorldCollision(player);

  player.x = clamp(player.x, 0, world.width - player.w);
  player.angle = Math.atan2(mouse.y - (player.y + player.h / 2), mouse.x - (player.x - cameraX + player.w / 2));

  if (player.cooldown > 0) player.cooldown--;
  if (player.reloading > 0) player.reloading--;

  if (mouse.down && !editMode) fireWeapon(player, mouse.x + cameraX, mouse.y);
  if (mouse.right) placeBuild();

  cameraX = clamp(player.x - canvas.width / 2, 0, world.width - canvas.width);
}

function findTargetForBot(bot) {
  if (player.hp <= 0) return null;
  return player;
}

function botBuild(bot, target) {
  if (Math.random() < 0.02) {
    const oldMouseX = mouse.x;
    const oldMouseY = mouse.y;
    mouse.x = bot.x - cameraX + rand(-40, 40);
    mouse.y = bot.y + rand(-20, 20);
    placeBuild(['wall', 'ramp', 'floor'][Math.floor(Math.random() * 3)], bot);
    mouse.x = oldMouseX;
    mouse.y = oldMouseY;
  }
}

function updateBots() {
  for (const bot of enemies) {
    if (bot.hp <= 0) continue;
    const target = findTargetForBot(bot);
    if (!target) continue;

    const dx = target.x - bot.x;
    bot.vx = 0;
    if (Math.abs(dx) > 220) bot.vx = Math.sign(dx) * 2.6;
    if (Math.abs(dx) < 140) bot.vx = -Math.sign(dx) * 1.8;

    if (Math.random() < 0.01 && bot.grounded) bot.vy = bot.jump;

    bot.x += bot.vx;
    bot.y += bot.vy;
    bot.vy += GRAVITY;
    handleWorldCollision(bot);
    bot.x = clamp(bot.x, 0, world.width - bot.w);

    if (bot.cooldown > 0) bot.cooldown--;
    if (bot.reloading > 0) bot.reloading--;

    if (Math.abs(dx) < 650 && Math.random() < 0.08) {
      fireWeapon(bot, target.x + target.w / 2, target.y + target.h / 2);
    }

    if (Math.random() < 0.01) botBuild(bot, target);

    if (bot.weapon !== 'pickaxe' && bot.ammo[bot.weapon] !== undefined && bot.ammo[bot.weapon] <= 0) {
      reloadWeapon(bot);
    }
  }
}

function updateLoot() {
  for (let i = lootDrops.length - 1; i >= 0; i--) {
    const loot = lootDrops[i];
    loot.bob += 0.08;
    const box = { x: loot.x, y: loot.y + Math.sin(loot.bob) * 4, w: loot.w, h: loot.h };
    if (rects(player, box)) {
      pickupLoot(loot.item);
      lootDrops.splice(i, 1);
      continue;
    }
    for (const bot of enemies) {
      if (bot.hp > 0 && rects(bot, box) && Math.random() < 0.05) {
        botPickLoot(bot, loot.item);
        lootDrops.splice(i, 1);
        break;
      }
    }
  }
}

function pickupLoot(item) {
  if (item === 'ammo') {
    player.ammo.rifle += 40;
    player.ammo.shotgun += 12;
    player.ammo.smg += 50;
    player.ammo.sniper += 5;
  } else if (item === 'wood' || item === 'brick' || item === 'metal') {
    player.materials[item] += 40;
  } else if (item === 'mini' || item === 'medkit') {
    player.inventory[4] = item;
  } else if (weapons[item]) {
    player.inventory[4] = item;
  }
  notify('Picked up ' + item);
}

function botPickLoot(bot, item) {
  if (item === 'ammo') {
    bot.ammo.rifle += 20;
    bot.ammo.shotgun += 8;
    bot.ammo.smg += 30;
    bot.ammo.sniper += 2;
  }
  if (item === 'wood' || item === 'brick' || item === 'metal') bot.materials[item] += 25;
  if (weapons[item]) bot.weapon = item;
  if (item === 'mini') bot.shield = clamp(bot.shield + 25, 0, 100);
  if (item === 'medkit') bot.hp = clamp(bot.hp + 30, 0, 100);
}

function updateStorm() {
  zoneTimer--;
  if (zoneTimer <= 0) {
    stormShrink = true;
    zoneTimer = 60 * 15;
  }
  if (stormShrink) {
    stormRadius -= 0.5;
    if (stormRadius < 500) stormRadius = 500;
  }

  const centerX = world.width / 2;
  const applyStorm = ent => {
    const d = Math.abs((ent.x + ent.w / 2) - centerX);
    if (d > stormRadius && elapsed % 30 === 0) {
      ent.hp -= 1.2;
      damageText(ent.x, ent.y, '-1', '#8e44ad');
    }
  };

  applyStorm(player);
  for (const bot of enemies) if (bot.hp > 0) applyStorm(bot);
}

function updateEffects() {
  for (let i = notifications.length - 1; i >= 0; i--) {
    notifications[i].life--;
    if (notifications[i].life <= 0) notifications.splice(i, 1);
  }
  for (let i = damageTexts.length - 1; i >= 0; i--) {
    const d = damageTexts[i];
    d.y += d.vy;
    d.life--;
    if (d.life <= 0) damageTexts.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function checkWinState() {
  const aliveEnemies = enemies.filter(e => e.hp > 0).length;
  if (player.hp <= 0 && roundActive) {
    roundActive = false;
    winnerText = 'You Lost';
    notify('Defeat');
  }
  if (aliveEnemies === 0 && roundActive) {
    roundActive = false;
    winnerText = 'Victory';
    notify('You win!');
  }
}

function resetRound() {
  player.x = 150;
  player.y = 100;
  player.hp = 100;
  player.shield = 50;
  player.materials = { wood: 150, brick: 120, metal: 100 };
  player.ammo = { rifle: 999, shotgun: 60, smg: 180, sniper: 25 };
  player.inventory = ['rifle', 'shotgun', 'smg', 'pickaxe', 'mini'];
  player.weapon = 'rifle';
  player.cooldown = 0;
  builds.length = 0;
  bullets.length = 0;
  lootDrops.length = 0;
  for (let i = 0; i < 15; i++) addLoot(rand(200, world.width - 200), rand(250, 520));
  const spawns = [1200, 1900, 2600];
  enemies.forEach((e, i) => {
    e.x = spawns[i];
    e.y = 100;
    e.hp = 100;
    e.shield = 50;
    e.cooldown = 0;
  });
  stormRadius = 2000;
  zoneTimer = 60 * 20;
  roundActive = true;
  winnerText = '';
}

function update() {
  elapsed++;
  if (keys['p']) resetRound();
  if (!roundActive) return;
  updatePlayer();
  updateBots();
  updateBullets();
  updateLoot();
  updateStorm();
  updateEffects();
  checkWinState();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#7fd3ff');
  g.addColorStop(1, '#dff6ff');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawHills() {
  ctx.save();
  ctx.translate(-cameraX * 0.4, 0);
  for (const h of world.hills) {
    ctx.fillStyle = '#76b56a';
    ctx.beginPath();
    ctx.ellipse(h.x, GROUND_Y, h.w, h.h, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(-cameraX, GROUND_Y, world.width, canvas.height - GROUND_Y);
}

function drawPlatforms() {
  ctx.fillStyle = '#8d6e63';
  for (const p of world.platforms) {
    ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
  }
}

function drawDecorations() {
  for (const d of world.decorations) {
    const x = d.x - cameraX;
    if (x < -100 || x > canvas.width + 100) continue;
    if (d.type === 'tree') {
      ctx.fillStyle = '#8d5524';
      ctx.fillRect(x, d.y - 60, 12, 60);
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath();
      ctx.arc(x + 6, d.y - 78, 26, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(x, d.y - 18, 26, 18);
    }
  }
}

function drawBuild(build) {
  const x = build.x - cameraX;
  const y = build.y;
  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.fillStyle = materials[build.material].color;

  if (build.type === 'wall') {
    ctx.fillRect(x, y, build.w, build.h);
  }
  if (build.type === 'floor') {
    ctx.fillRect(x, y + 28, build.w, 14);
  }
  if (build.type === 'roof') {
    ctx.beginPath();
    ctx.moveTo(x, y + build.h);
    ctx.lineTo(x + build.w / 2, y + 8);
    ctx.lineTo(x + build.w, y + build.h);
    ctx.closePath();
    ctx.fill();
  }
  if (build.type === 'ramp') {
    ctx.beginPath();
    ctx.moveTo(x, y + build.h);
    ctx.lineTo(x + build.w, y + build.h);
    ctx.lineTo(x + build.w, y);
    ctx.closePath();
    ctx.fill();
  }

  if (build.edited) {
    ctx.clearRect(x + 14, y + 14, 20, 20);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 14, y + 14, 20, 20);
  }

  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.fillRect(x, y - 8, build.w, 5);
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(x, y - 8, build.w * (build.hp / build.maxHp), 5);
  ctx.restore();
}

function drawCharacter(ch) {
  if (ch.hp <= 0) return;
  const x = ch.x - cameraX;
  ctx.fillStyle = ch.color;
  ctx.fillRect(x, ch.y, ch.w, ch.h);

  ctx.fillStyle = 'red';
  ctx.fillRect(x, ch.y - 14, ch.w, 5);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(x, ch.y - 14, ch.w * (ch.hp / ch.maxHp), 5);

  ctx.fillStyle = '#2980b9';
  ctx.fillRect(x, ch.y - 8, ch.w * (ch.shield / ch.maxShield), 4);

  ctx.fillStyle = 'black';
  ctx.font = '12px Arial';
  ctx.fillText(ch.name, x, ch.y - 20);
}

function drawBullets() {
  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x - cameraX, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLoot() {
  for (const loot of lootDrops) {
    const y = loot.y + Math.sin(loot.bob) * 4;
    ctx.fillStyle = '#fff';
    ctx.fillRect(loot.x - cameraX, y, loot.w, loot.h);
    ctx.fillStyle = '#000';
    ctx.font = '10px Arial';
    ctx.fillText(loot.item, loot.x - cameraX - 4, y - 4);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX, p.y, 4, 4);
    ctx.globalAlpha = 1;
  }
}

function drawDamageTexts() {
  for (const d of damageTexts) {
    ctx.globalAlpha = d.life / 60;
    ctx.fillStyle = d.color;
    ctx.font = 'bold 16px Arial';
    ctx.fillText(d.text, d.x - cameraX, d.y);
    ctx.globalAlpha = 1;
  }
}

function drawPreview() {
  const p = getBuildPreview();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = materials[buildMaterial].color;
  if (buildType === 'wall') ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
  if (buildType === 'floor') ctx.fillRect(p.x - cameraX, p.y + 28, p.w, 14);
  if (buildType === 'roof') {
    ctx.beginPath();
    ctx.moveTo(p.x - cameraX, p.y + p.h);
    ctx.lineTo(p.x - cameraX + p.w / 2, p.y + 8);
    ctx.lineTo(p.x - cameraX + p.w, p.y + p.h);
    ctx.closePath();
    ctx.fill();
  }
  if (buildType === 'ramp') {
    ctx.beginPath();
    ctx.moveTo(p.x - cameraX, p.y + p.h);
    ctx.lineTo(p.x - cameraX + p.w, p.y + p.h);
    ctx.lineTo(p.x - cameraX + p.w, p.y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawStorm() {
  const centerX = world.width / 2 - cameraX;
  ctx.save();
  ctx.strokeStyle = 'rgba(142,68,173,.6)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(centerX, GROUND_Y - 140, stormRadius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawHUD() {
  ui.textContent =
`WASD Move | Space Jump | C Crouch | Shift Sprint
Right Click Build | E Edit | Q Pickaxe | R Reload
1-5 Slots | X Material | F Use Item | G Drop | B Mode | M Map | P Reset

Mode: ${gameMode}
Weapon: ${player.weapon}
Slot Item: ${player.inventory[selectedSlot]}
HP: ${Math.round(player.hp)}  Shield: ${Math.round(player.shield)}
Ammo: R ${player.ammo.rifle} | SG ${player.ammo.shotgun} | SMG ${player.ammo.smg} | SN ${player.ammo.sniper}
Mats: Wood ${player.materials.wood} | Brick ${player.materials.brick} | Metal ${player.materials.metal}
Elims: ${player.eliminations}
Storm: ${Math.round(stormRadius)} | Timer: ${Math.ceil(zoneTimer / 60)}`;

  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.fillRect(16, canvas.height - 82, 350, 62);
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i === selectedSlot ? '#f1c40f' : '#ffffff';
    ctx.fillRect(24 + i * 64, canvas.height - 72, 54, 42);
    ctx.fillStyle = '#000';
    ctx.font = '12px Arial';
    ctx.fillText(player.inventory[i] || '-', 28 + i * 64, canvas.height - 47);
  }

  for (let i = 0; i < notifications.length; i++) {
    const n = notifications[i];
    ctx.globalAlpha = Math.min(1, n.life / 40);
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(canvas.width - 280, 20 + i * 32, 250, 24);
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    ctx.fillText(n.text, canvas.width - 270, 37 + i * 32);
    ctx.globalAlpha = 1;
  }
}

function drawMinimap() {
  if (!showMap) return;
  const mw = 260;
  const mh = 120;
  const mx = canvas.width - mw - 18;
  const my = canvas.height - mh - 18;
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(mx + 6, my + 50, mw - 12, 30);

  const px = mx + (player.x / world.width) * mw;
  ctx.fillStyle = '#1e90ff';
  ctx.fillRect(px, my + 40, 6, 40);

  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const ex = mx + (e.x / world.width) * mw;
    ctx.fillStyle = '#ff4d4d';
    ctx.fillRect(ex, my + 44, 6, 34);
  }
}

function drawWinner() {
  if (roundActive) return;
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 56px Arial';
  ctx.fillText(winnerText, canvas.width / 2 - 120, 150);
  ctx.font = '24px Arial';
  ctx.fillText('Press P to reset round', canvas.width / 2 - 110, 200);
}

function draw() {
  drawSky();
  drawHills();
  drawGround();
  drawPlatforms();
  drawDecorations();
  drawStorm();
  drawPreview();
  for (const b of builds) drawBuild(b);
  drawLoot();
  drawBullets();
  drawParticles();
  drawCharacter(player);
  for (const e of enemies) drawCharacter(e);
  drawDamageTexts();
  drawHUD();
  drawMinimap();
  drawWinner();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

notify('Build Battle Deluxe loaded');
loop();
</script>
</body>
</html>
