<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blooket-style Game Engine Deluxe</title>
    <style>
        :root {
            --primary: #4caf50;
            --secondary: #2196f3;
            --accent: #ff9800;
            --danger: #f44336;
            --bg: #eef2f7;
            --text: #1f2937;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .navbar { position: sticky; top: 0; background: var(--primary); color: white; padding: 16px; display: flex; justify-content: space-between; }
        .btn { padding: 10px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; }
        .view { display: none; }
        .visible { display: block; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚀 <strong>Blook Engine Deluxe</strong></div>
        <div class="nav-links">
            <button class="btn" onclick="showView('menu')">Home</button>
            <button class="btn" onclick="showView('play')">Play</button>
            <button class="btn" onclick="showView('shop')">Shop</button>
            <button class="btn" onclick="showView('inventory')">Inventory</button>
        </div>
    </nav>

    <div id="view-menu" class="view visible">
        <h1>Welcome, Blook Master!</h1>
        <button class="btn" onclick="showView('play')">Start Trivia</button>
    </div>

    <div id="view-play" class="view">
        <h2 id="question-text">Loading Question...</h2>
        <div id="options-container" class="options-grid"></div>
        <button class="btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="view-shop" class="view">
        <h2>Shop</h2>
        <p>Buy packs here!</p>
    </div>

    <div id="view-inventory" class="view">
        <h2>Your Inventory</h2>
        <div id="inventory-grid"></div>
        <button class="btn" onclick="showView('menu')">Back to Menu</button>
    </div>

    <script>
        const questions = [
            { question: "What is 2 + 2?", answers: ["3", "4", "5", "6"], correct: 1 },
            { question: "What is the capital of France?", answers: ["Berlin", "Madrid", "Paris", "Lisbon"], correct: 2 },
        ];

        let currentQuestionIndex = 0;

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('visible'));
            document.getElementById('view-' + viewId).classList.add('visible');
            if (viewId === 'play') loadQuestion();
            if (viewId === 'inventory') renderInventory();
        }

        function loadQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = question.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            question.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.innerText = answer;
                btn.className = 'btn';
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const question = questions[currentQuestionIndex];
            if (index === question.correct) {
                alert("Correct!");
            } else {
                alert("Wrong answer!");
            }
        }

        function nextQuestion() {
            currentQuestionIndex = (currentQuestionIndex + 1) % questions.length;
            loadQuestion();
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '<p>Your inventory is empty.</p>'; // Placeholder for inventory items
        }

        // Initialize the game
        showView('menu');
    </script>
</body>
</html>
