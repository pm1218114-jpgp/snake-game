<!DOCTYPE html>
<html>
<body>
    <h3>Volume Booster (Up to 600%)</h3>
    <video id="video" width="320" height="240" controls>
        <source src="your-video.mp4" type="video/mp4">
    </video>
    <br>
    <label for="boost">Boost:</label>
    <input type="range" id="boost" min="1" max="6" step="0.1" value="1">
    <span id="val">1x</span>

    <script>
        const video = document.getElementById('video');
        const boost = document.getElementById('boost');
        const val = document.getElementById('val');
        
        let audioCtx;
        let gainNode;

        boost.addEventListener('input', function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(video);
                gainNode = audioCtx.createGain();
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
            gainNode.gain.value = boost.value;
            val.innerText = boost.value + 'x';
        });
    </script>
</body>
</html>
