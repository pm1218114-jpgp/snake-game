<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Booklet</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .booklet { margin: 20px; }
        .token-counter { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="booklet">
        <h1>My Booklet</h1>
        <p>This is a simple booklet where you can add tokens.</p>
        <div class="token-counter">
            <h2>Tokens: <span id="tokenCount">0</span></h2>
            <button id="add1">Add 1</button>
            <button id="add10">Add 10</button>
            <button id="add100">Add 100</button>
            <button id="add1000">Add 1000</button>
        </div>
    </div>

    <script>
        let tokenCount = 0;
        document.getElementById('add1').onclick = () => updateTokenCount(1);
        document.getElementById('add10').onclick = () => updateTokenCount(10);
        document.getElementById('add100').onclick = () => updateTokenCount(100);
        document.getElementById('add1000').onclick = () => updateTokenCount(1000);

        function updateTokenCount(amount) {
            tokenCount += amount;
            document.getElementById('tokenCount').innerText = tokenCount;
        }
    </script>
</body>
</html>
