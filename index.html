<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unblocked Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .menu {
      margin: 20px;
    }
    .menu button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #00bcd4;
      color: white;
    }
    .menu button:hover {
      background: #0097a7;
    }
    .game-container {
      width: 90%;
      height: 80vh;
      margin: 20px auto;
      border: 2px solid #444;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .fullscreen-btn {
      margin: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
    }
  </style>
</head>
<body>
  <header>Unblocked Games</header>

  <div class="menu">
    <button onclick="loadGame('https://slither.io')">Play Slither.io</button>
    <button onclick="loadGame('https://1v1.lol')">Play 1v1.LOL</button>
    <button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>
  </div>

  <div class="game-container" id="gameContainer">
    <iframe id="gameFrame" src="" allowfullscreen></iframe>
  </div>

  <script>
    function loadGame(url) {
      document.getElementById('gameFrame').src = url;
    }

    function goFullscreen() {
      const elem = document.getElementById('gameContainer');
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
