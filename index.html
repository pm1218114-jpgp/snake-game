<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io Clone</title>
    <style>
        body { margin: 0; }
        canvas { background: #000; display: block; }
        #score { color: white; position: absolute; top: 10px; left: 10px; font-size: 24px; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let playerSnake = [{ x: canvas.width / 2, y: canvas.height / 2 }];
        let direction = { x: 0, y: 0 };
        let food = { x: Math.random() * canvas.width, y: Math.random() * canvas.height };
        let score = 0;
        let bots = [];
        const botCount = 3; 
        let growthRate = 0;

        for (let i = 0; i < botCount; i++) {
            bots.push([{ x: Math.random() * canvas.width, y: Math.random() * canvas.height }]);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') direction = { x: 0, y: -10 };
            else if (event.key === 'ArrowDown') direction = { x: 0, y: 10 };
            else if (event.key === 'ArrowLeft') direction = { x: -10, y: 0 };
            else if (event.key === 'ArrowRight') direction = { x: 10, y: 0 };
        });

        function update() {
            const head = { x: playerSnake[0].x + direction.x, y: playerSnake[0].y + direction.y };
            playerSnake.unshift(head);

            if (head.x < food.x + 10 && head.x + 10 > food.x && head.y < food.y + 10 && head.y + 10 > food.y) {
                score++;
                growthRate += 5; // Increase growth rate upon eating food
                food = { x: Math.random() * canvas.width, y: Math.random() * canvas.height };
            } else {
                if (growthRate > 0) {
                    growthRate--; // Decrease growth rate over time for smooth growth
                } else {
                    playerSnake.pop(); // Remove last segment only when not growing
                }
            }

            bots.forEach(bot => {
                const target = findClosestTarget(bot[0]);
                moveBotTowardsTarget(bot, target);
            });

            if (bots.some(bot => bot.slice(0, bot.length - 1).some(segment => segment.x === head.x && segment.y === head.y))) {
                alert("You Died! Restarting the game...");
                resetGame();
            }

            if (score >= 10) {
                alert("You Win! Restarting the game...");
                resetGame();
            }
        }

        function findClosestTarget(botHead) {
            let closest = { distance: Infinity, target: null };
            bots.forEach(bot => {
                const distance = Math.sqrt(Math.pow(botHead.x - bot[0].x, 2) + Math.pow(botHead.y - bot[0].y, 2));
                if (distance < closest.distance) {
                    closest = { distance, target: bot[0] };
                }
            });

            const playerDistance = Math.sqrt(Math.pow(botHead.x - playerSnake[0].x, 2) + Math.pow(botHead.y - playerSnake[0].y, 2));
            if (playerDistance < closest.distance) {
                closest = { distance: playerDistance, target: playerSnake[0] };
            }

            return closest.target;
        }

        function moveBotTowardsTarget(bot, target) {
            if (!target) return;
            const dx = target.x - bot[0].x;
            const dy = target.y - bot[0].y;
            const angle = Math.atan2(dy, dx);
            bot.unshift({ x: bot[0].x + Math.cos(angle) * 10, y: bot[0].y + Math.sin(angle) * 10 });
            bot.pop();
        }

        function resetGame() {
            playerSnake = [{ x: canvas.width / 2, y: canvas.height / 2 }];
            direction = { x: 0, y: 0 };
            score = 0;
            growthRate = 0;
            bots = [];
            for (let i = 0; i < botCount; i++) {
                bots.push([{ x: Math.random() * canvas.width, y: Math.random() * canvas.height }]);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            playerSnake.forEach(segment => {
                ctx.fillStyle = 'lime';
                ctx.fillRect(segment.x, segment.y, 10, 10);
            });

            bots.forEach(bot => {
                ctx.fillStyle = 'orange';
                ctx.fillRect(bot[0].x, bot[0].y, 10, 10);
            });

            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, 10, 10);
            document.getElementById('score').innerText = `Score: ${score}`;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
