<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Split-Screen Slither</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .viewport { position: relative; width: 50%; height: 100%; border-right: 3px solid #333; overflow: hidden; }
        canvas { display: block; background: #111; width: 100%; height: 100%; }
        .ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; pointer-events: none; z-index: 10; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; color: white; flex-direction: column; text-align: center; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Fixed Multiplayer Slither</h1>
        <p>Player 1 (Left): <b>WASD</b> | Player 2 (Right): <b>Arrow Keys</b></p>
        <button onclick="startGame()">CLICK TO START</button>
    </div>

    <div class="container">
        <div class="viewport">
            <div class="ui">P1 Score: <span id="score1">0</span></div>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="viewport">
            <div class="ui">P2 Score: <span id="score2">0</span></div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <script>
        const c1 = document.getElementById('canvas1');
        const c2 = document.getElementById('canvas2');
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');
        const WORLD_SIZE = 2500;
        let gameRunning = false;
        const keys = {};

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            gameRunning = true;
            resize();
            loop();
        }

        function resize() {
            c1.width = window.innerWidth / 2;
            c1.height = window.innerHeight;
            c2.width = window.innerWidth / 2;
            c2.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyW","KeyS","KeyA","KeyD"].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        class Snake {
            constructor(x, y, color, controls, id) {
                this.startX = x; this.startY = y;
                this.color = color;
                this.controls = controls;
                this.id = id;
                this.reset();
            }
            reset() {
                this.x = this.startX;
                this.y = this.startY;
                this.angle = (this.id === 1) ? 0 : Math.PI;
                this.score = 0;
                this.radius = 12;
                this.segments = [];
                for(let i=0; i<30; i++) this.segments.push({x: this.x, y: this.y});
                const scoreSpan = document.getElementById('score' + this.id);
                if(scoreSpan) scoreSpan.innerText = "0";
            }
            update() {
                if (keys[this.controls.up]) this.angle = -Math.PI / 2;
                else if (keys[this.controls.down]) this.angle = Math.PI / 2;
                else if (keys[this.controls.left]) this.angle = Math.PI;
                else if (keys[this.controls.right]) this.angle = 0;

                this.x += Math.cos(this.angle) * 5;
                this.y += Math.sin(this.angle) * 5;

                // Death: Boundary
                if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) this.reset();

                // Move segments
                this.segments.unshift({x: this.x, y: this.y});
                const maxLength = 30 + Math.floor(this.score / 5);
                while (this.segments.length > maxLength) this.segments.pop();
            }
            draw(ctx, cx, cy) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.radius * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x - cx, this.segments[0].y - cy);
                for(let i=1; i<this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x - cx, this.segments[i].y - cy);
                }
                ctx.stroke();

                // Head Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x - cx, this.y - cy, this.radius * 0.6, 0, Math.PI*2);
                ctx.fill();
            }
        }

        const p1 = new Snake(400, 1250, '#4CAF50', {up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD'}, 1);
        const p2 = new Snake(2100, 1250, '#2196F3', {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'}, 2);
        let food = Array(150).fill(0).map(() => ({
            x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, r: 5, c: 'yellow'
        }));

        function loop() {
            if (!gameRunning) return;
            p1.update(); p2.update();

            // Food collision
            [p1, p2].forEach(p => {
                food.forEach((f, i) => {
                    if(Math.hypot(p.x - f.x, p.y - f.y) < p.radius + f.r) {
                        p.score += 10;
                        document.getElementById('score'+p.id).innerText = p.score;
                        food[i] = {x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, r:5, c:'yellow'};
                    }
                });
                
                // Death: Other Snake Body
                const other = (p === p1) ? p2 : p1;
                other.segments.forEach(seg => {
                    if(Math.hypot(p.x - seg.x, p.y - seg.y) < p.radius) p.reset();
                });
            });

            render(ctx1, p1);
            render(ctx2, p2);
            requestAnimationFrame(loop);
        }

        function render(ctx, activePlayer) {
            const canvas = ctx.canvas;
            const cx = activePlayer.x - canvas.width/2;
            const cy = activePlayer.y - canvas.height/2;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw border
            ctx.strokeStyle = 'red'; ctx.lineWidth = 10;
            ctx.strokeRect(-cx, -cy, WORLD_SIZE, WORLD_SIZE);

            // Food
            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x - cx, f.y - cy, f.r, 0, Math.PI*2); ctx.fill();
            });

            p1.draw(ctx, cx, cy);
            p2.draw(ctx, cx, cy);
        }
    </script>
</body>
</html>
