<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unblocked Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }
    header {
      background: #222;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .menu {
      padding: 30px;
    }
    .game-btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00bcd4;
      color: white;
      cursor: pointer;
    }
    .game-btn:hover {
      background: #0097a7;
    }
    .note {
      color: #bbb;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>Unblocked Games</header>

  <div class="menu">
    <button class="game-btn" onclick="openGame('https://slither.io')">Play Slither.io</button>
    <button class="game-btn" onclick="openGame('https://1v1.lol')">Play 1v1.LOL</button>
    <p class="note">These games open in a new tab because their sites block iframe embedding.</p>
  </div>

  <script>
    function openGame(url) {
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
