<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Minecraft Survival - FIXED</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #hud { position: fixed; bottom: 20px; left: 20px; color: #ff4d4d; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        #time-info { position: fixed; top: 10px; right: 20px; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        #damage-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; pointer-events: none; z-index: 50; }
        #inventory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; }
        .window { background: #8b8b8b; border: 6px solid #444; padding: 20px; display: flex; gap: 30px; }
        .grid { display: grid; gap: 4px; background: #555; padding: 5px; border: 3px solid #333; }
        .slot { width: 55px; height: 55px; background: #8b8b8b; border: 3px solid #373737; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 11px; color: #fff; text-shadow: 1px 1px #000; }
        .slot:hover { background: #aaa; }
        .slot::after { content: attr(data-count); position: absolute; bottom: 2px; right: 5px; font-size: 16px; }
        .result-slot { width: 65px; height: 65px; border: 4px solid #fff; background: #444; margin: 10px auto; }
        #click-to-start { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; cursor: pointer; }
    </style>
</head>
<body>

    <div id="click-to-start">
        <h1>3D MINECRAFT</h1>
        <p>CLICK ANYWHERE TO START</p>
        <p style="font-size: 14px;">WASD: Move | E: Inventory | Left-Click: Mine/Attack</p>
    </div>

    <div id="crosshair"></div>
    <div id="damage-flash"></div>
    <div id="hud">HEALTH: <span id="hp-val">20</span></div>
    <div id="time-info">TIME: <span id="time-val">Day</span></div>

    <div id="inventory-screen">
        <div class="window">
            <div>
                <h3>CRAFTING</h3>
                <div id="craft-grid" class="grid" style="grid-template-columns: repeat(3, 55px);"></div>
                <div id="craft-result" class="slot result-slot"></div>
            </div>
            <div>
                <h3>BACKPACK</h3>
                <div id="inv-grid" class="grid" style="grid-template-columns: repeat(4, 55px);"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com';

        // --- AUDIO ENGINE ---
        let audioCtx;
        function playSound(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- RENDERER SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- GAME DATA ---
        const blocks = [], mobs = [];
        let inventory = { wood: 5, stone: 0, iron: 0, diamond: 0, stick: 0 };
        let craftingGrid = Array(9).fill(null);
        let player = { hp: 20, isPaused: false, velocityY: 0, started: false };
        let gameTime = 0, isDay = true;
        const keys = {};

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x4caf50 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x808080 }),
            wood: new THREE.MeshLambertMaterial({ color: 0x5d4037 }),
            iron: new THREE.MeshLambertMaterial({ color: 0xdcdcdc }),
            diamond: new THREE.MeshLambertMaterial({ color: 0x00ffff }),
            zombie: new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
        };
        const geo = new THREE.BoxGeometry(1, 1, 1);

        // --- WORLD GEN ---
        for (let x = -15; x < 15; x++) {
            for (let z = -15; z < 15; z++) {
                let type = 'grass';
                if (Math.random() > 0.85) type = 'stone';
                if (Math.random() > 0.97) type = 'iron';
                const b = new THREE.Mesh(geo, mats[type]);
                b.position.set(x, 0, z);
                b.userData.type = type;
                scene.add(b);
                blocks.push(b);
            }
        }

        // --- ZOMBIE CLASS ---
        class Zombie {
            constructor(x, z) {
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.7), mats.zombie.clone());
                this.mesh.position.set(x, 1.4, z);
                this.mesh.userData = { hp: 6 };
                scene.add(this.mesh);
                this.dir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize();
            }
            update() {
                this.mesh.position.addScaledVector(this.dir, 0.025);
                if(this.mesh.position.distanceTo(camera.position) < 1.2) damagePlayer(0.1);
                if(isDay) { this.mesh.userData.hp -= 0.01; this.mesh.material.emissive.setHex(0xff5500); }
                else { this.mesh.material.emissive.setHex(0x000000); }
                return this.mesh.userData.hp > 0;
            }
        }

        function damagePlayer(amt) {
            player.hp -= amt;
            document.getElementById('hp-val').innerText = Math.ceil(player.hp);
            if(Math.random() > 0.95) {
                document.getElementById('damage-flash').style.display = 'block';
                setTimeout(() => document.getElementById('damage-flash').style.display = 'none', 50);
            }
        }

        // --- INPUTS ---
        document.getElementById('click-to-start').onclick = () => {
            player.started = true;
            document.getElementById('click-to-start').style.display = 'none';
            renderer.domElement.requestPointerLock();
            if (audioCtx) audioCtx.resume();
        };

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && player.started) toggleInventory();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function toggleInventory() {
            player.isPaused = !player.isPaused;
            document.getElementById('inventory-screen').style.display = player.isPaused ? 'flex' : 'none';
            if (player.isPaused) document.exitPointerLock();
            else renderer.domElement.requestPointerLock();
            renderUI();
        }

        renderer.domElement.addEventListener('mousedown', e => {
            if (player.isPaused || !player.started) return;
            raycaster.setFromCamera({x:0, y:0}, camera);
            const blockHits = raycaster.intersectObjects(blocks);
            if (blockHits.length > 0) {
                const b = blockHits[0].object;
                if (e.button === 0) {
                    inventory[b.userData.type]++;
                    scene.remove(b);
                    blocks.splice(blocks.indexOf(b), 1);
                    playSound(200, 'sine', 0.05);
                }
            }
        });

        const raycaster = new THREE.Raycaster();
        camera.position.set(0, 2, 5);

        // --- UI & CRAFTING ---
        function renderUI() {
            const inv = document.getElementById('inv-grid');
            inv.innerHTML = '';
            Object.keys(inventory).forEach(item => {
                if(inventory[item] <= 0) return;
                const s = document.createElement('div');
                s.className = 'slot'; s.innerText = item; s.setAttribute('data-count', inventory[item]);
                s.onclick = () => {
                    const idx = craftingGrid.indexOf(null);
                    if(idx !== -1) { craftingGrid[idx] = item; inventory[item]--; renderUI(); }
                };
                inv.appendChild(s);
            });
            const craft = document.getElementById('craft-grid');
            craft.innerHTML = '';
            craftingGrid.forEach((item, i) => {
                const s = document.createElement('div');
                s.className = 'slot'; s.innerText = item || "";
                s.onclick = () => { if(item) { inventory[item]++; craftingGrid[i] = null; renderUI(); } };
                craft.appendChild(s);
            });
            // Recipe: 2 Wood (anywhere) = 4 Sticks
            const g = craftingGrid.filter(x => x !== null);
            let res = (g.length === 2 && g[0] === 'wood' && g[1] === 'wood') ? {type:'stick', n:4} : null;
            const rs = document.getElementById('craft-result');
            rs.innerText = res ? res.type : "";
            rs.onclick = () => { if(res) { inventory[res.type] += res.n; craftingGrid.fill(null); renderUI(); } };
        }

        // --- LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (player.started && !player.isPaused) {
                gameTime += 0.002;
                isDay = Math.sin(gameTime) > 0;
                scene.background = new THREE.Color().setHSL(0.6, 0.5, Math.max(0.05, Math.sin(gameTime) * 0.5 + 0.5));
                document.getElementById('time-val').innerText = isDay ? "Day" : "Night";

                if (mobs.length < 5 && Math.random() > 0.99) mobs.push(new Zombie(Math.random()*20-10, Math.random()*20-10));

                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                if (keys['KeyW']) camera.position.addScaledVector(dir, 0.1);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -0.1);
                if (keys['KeyA']) camera.position.addScaledVector(side, 0.1);
                if (keys['KeyD']) camera.position.addScaledVector(side, -0.1);

                player.velocityY -= 0.01;
                camera.position.y += player.velocityY;
                if(camera.position.y < 2) { camera.position.y = 2; player.velocityY = 0; }
                if(keys['Space'] && camera.position.y <= 2) player.velocityY = 0.15;

                for(let i = mobs.length - 1; i >= 0; i--) {
                    if (!mobs[i].update()) { scene.remove(mobs[i].mesh); mobs.splice(i, 1); }
                }
            }
            if (document.pointerLockElement === renderer.domElement) {
                camera.rotation.order = 'YXZ';
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement && !player.isPaused) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        animate();
    </script>
</body>
</html>
