<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Player Same Screen Slither</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #444;
            border-radius: 8px;
        }
        canvas {
            display: block;
            background-color: #050505;
        }
        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-bottom: 15px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .p1-score { color: #ff4747; text-shadow: 0 0 10px #ff4747; }
        .p2-score { color: #4747ff; text-shadow: 0 0 10px #4747ff; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        h1 { font-size: 48px; margin-bottom: 10px; }
        button {
            padding: 12px 30px;
            font-size: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #ccc; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="p1-score">P1 (WASD): <span id="s1">0</span></div>
        <div class="p2-score">P2 (ARROWS): <span id="s2">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="overlay">
            <h1 id="status-text">PLAYER 1 WINS!</h1>
            <p>Don't hit walls, yourself, or each other.</p>
            <button onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const s1Elem = document.getElementById('s1');
        const s2Elem = document.getElementById('s2');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let food, p1, p2, gameRunning;

        class Snake {
            constructor(x, y, color, isP1) {
                this.spawnPos = {x, y};
                this.color = color;
                this.isP1 = isP1;
                this.init();
            }

            init() {
                this.body = [
                    {x: this.spawnPos.x, y: this.spawnPos.y},
                    {x: this.spawnPos.x - (this.isP1 ? 1 : -1), y: this.spawnPos.y},
                    {x: this.spawnPos.x - (this.isP1 ? 2 : -2), y: this.spawnPos.y}
                ];
                this.dir = { x: this.isP1 ? 1 : -1, y: 0 };
                this.nextDir = { x: this.isP1 ? 1 : -1, y: 0 };
                this.score = 0;
                this.alive = true;
            }

            update() {
                if (!this.alive) return;
                this.dir = this.nextDir;
                const head = { x: this.body[0].x + this.dir.x, y: this.body[0].y + this.dir.y };
                
                this.body.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    this.score++;
                    spawnFood();
                } else {
                    this.body.pop();
                }
            }

            checkCollisions(other) {
                if (!this.alive) return;
                const head = this.body[0];

                // 1. Wall Collision
                if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                    this.alive = false;
                }

                // 2. Self Collision
                for (let i = 1; i < this.body.length; i++) {
                    if (head.x === this.body[i].x && head.y === this.body[i].y) this.alive = false;
                }

                // 3. Other Player Body Collision
                other.body.forEach(seg => {
                    if (head.x === seg.x && head.y === seg.y) this.alive = false;
                });
            }

            draw() {
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.alive ? this.color : '#555';
                ctx.fillStyle = this.alive ? this.color : '#555';
                
                this.body.forEach((seg, index) => {
                    // Make head slightly different
                    if (index === 0) ctx.globalAlpha = 1.0;
                    else ctx.globalAlpha = 0.8;
                    
                    ctx.fillRect(seg.x * GRID, seg.y * GRID, GRID - 2, GRID - 2);
                });
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }
        }

        function spawnFood() {
            food = { 
                x: Math.floor(Math.random() * (COLS - 2)) + 1, 
                y: Math.floor(Math.random() * (ROWS - 2)) + 1 
            };
        }

        function resetGame() {
            if (!p1) {
                p1 = new Snake(10, 15, '#ff4747', true);
                p2 = new Snake(30, 15, '#4747ff', false);
            } else {
                p1.init();
                p2.init();
            }
            spawnFood();
            gameRunning = true;
            overlay.style.display = 'none';
        }

        window.addEventListener('keydown', e => {
            // P1: WASD (Prevents 180 turns)
            if (e.code === 'KeyW' && p1.dir.y === 0) p1.nextDir = { x: 0, y: -1 };
            if (e.code === 'KeyS' && p1.dir.y === 0) p1.nextDir = { x: 0, y: 1 };
            if (e.code === 'KeyA' && p1.dir.x === 0) p1.nextDir = { x: -1, y: 0 };
            if (e.code === 'KeyD' && p1.dir.x === 0) p1.nextDir = { x: 1, y: 0 };

            // P2: Arrows (Prevents 180 turns)
            if (e.code === 'ArrowUp' && p2.dir.y === 0) p2.nextDir = { x: 0, y: -1 };
            if (e.code === 'ArrowDown' && p2.dir.y === 0) p2.nextDir = { x: 0, y: 1 };
            if (e.code === 'ArrowLeft' && p2.dir.x === 0) p2.nextDir = { x: -1, y: 0 };
            if (e.code === 'ArrowRight' && p2.dir.x === 0) p2.nextDir = { x: 1, y: 0 };
        });

        function gameLoop() {
            if (gameRunning) {
                p1.update();
                p2.update();
                
                // Cross-check collisions
                p1.checkCollisions(p2);
                p2.checkCollisions(p1);

                if (!p1.alive || !p2.alive) {
                    gameRunning = false;
                    overlay.style.display = 'flex';
                    if (!p1.alive && !p2.alive) statusText.innerText = "DRAW! BOTH DIED";
                    else if (!p1.alive) statusText.innerText = "PLAYER 2 WINS!";
                    else statusText.innerText = "PLAYER 1 WINS!";
                }

                s1Elem.innerText = p1.score;
                s2Elem.innerText = p2.score;
            }

            // Draw Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid Lines (Subtle)
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=GRID) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=GRID) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Food
            ctx.fillStyle = '#00ff44';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff44';
            ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 2, GRID - 2);
            ctx.shadowBlur = 0;

            p1.draw();
            p2.draw();

            setTimeout(() => requestAnimationFrame(gameLoop), 100);
        }

        resetGame();
        gameLoop();
    </script>
</body>
</html>
