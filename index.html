<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Volume Booster</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #player-container { margin-top: 20px; }
        .controls { margin: 10px; }
    </style>
</head>
<body>
    <h1>YouTube Volume Booster</h1>
    <input type="text" id="videoLink" placeholder="Paste YouTube URL here" style="width: 300px;">
    <button onclick="loadVideo()">Load Video</button>

    <div id="player-container">
        <!-- YouTube Player will load here -->
        <div id="player"></div>
    </div>

    <div class="controls">
        <label for="boost">Boost Amount: </label>
        <input type="range" id="boost" min="1" max="10" step="0.5" value="1" oninput="updateBoost(this.value)">
        <span id="boostVal">1x</span>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function loadVideo() {
            const url = document.getElementById('videoLink').value;
            const videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            
            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player', {
                    height: '360',
                    width: '640',
                    videoId: videoId
                });
            }
        }

        // Note: Direct gain control of iframes is often restricted by CORS.
        function updateBoost(val) {
            document.getElementById('boostVal').innerText = val + 'x';
            // Custom boosting logic would go here if CORS allows access to the iframe's media element.
        }
    </script>
</body>
</html>
