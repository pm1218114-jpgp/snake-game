<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Game</title>
    <style>
        #court {
            width: 400px;
            height: 300px;
            background-color: lightblue;
            position: relative;
            overflow: hidden;
        }
        #hoop {
            width: 60px;
            height: 10px;
            background-color: red;
            position: absolute;
            top: 50px;
            left: 170px;
        }
        #ball {
            width: 20px;
            height: 20px;
            background-color: orange;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            left: 190px;
        }
        #accuracyBar {
            width: 100%;
            height: 20px;
            background-color: red;
            position: absolute;
            top: 10px;
        }
    </style>
</head>
<body>
    <h1>Basketball Game</h1>
    <div id="court">
        <div id="hoop"></div>
        <div id="ball"></div>
        <div id="accuracyBar"></div>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const accuracyBar = document.getElementById('accuracyBar');
        let ballPosition = { x: 190, y: 0 };
        let chargeLevel = 0;
        let charging = false;

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'w': ballPosition.y -= 10; break; // Move up
                case 'a': ballPosition.x -= 10; break; // Move left
                case 's': ballPosition.y += 10; break; // Move down
                case 'd': ballPosition.x += 10; break; // Move right
                case ' ':
                    charging = true;
                    chargeLevel = 0;
                    accuracyBar.style.width = '0%';
                    accuracyBar.style.backgroundColor = 'green';
                    chargeShot();
                    return;
            }
            ball.style.left = `${ballPosition.x}px`;
            ball.style.bottom = `${ballPosition.y}px`;
        });

        document.addEventListener('keyup', (event) => {
            if (event.key === ' ') {
                shooting();
                charging = false;
            }
        });

        function chargeShot() {
            if (charging) {
                chargeLevel += 1;
                accuracyBar.style.width = `${chargeLevel}%`;
                if (chargeLevel <= 33) {
                    accuracyBar.style.backgroundColor = 'green';
                } else if (chargeLevel <= 66) {
                    accuracyBar.style.backgroundColor = 'yellow';
                } else {
                    accuracyBar.style.backgroundColor = 'red';
                }
                requestAnimationFrame(chargeShot);
            }
        }

        function shooting() {
            const accuracy = chargeLevel; // Use chargeLevel for accuracy
            const shotHeight = 100 + (accuracy * 0.5); // Adjust shot height based on accuracy
            ball.style.transition = 'bottom 0.5s';
            ball.style.bottom = `${shotHeight}px`;
            setTimeout(() => {
                ball.style.bottom = '0';
            }, 500);
        }
    </script>
</body>
</html>
