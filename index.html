<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Split-Screen Slither - Death Match</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { display: flex; width: 100vw; height: 100vh; }
        .viewport { position: relative; width: 50%; height: 100%; border-right: 3px solid #333; overflow: hidden; }
        canvas { display: block; background: #111; }
        .ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; }
        .death-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.3); display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="viewport">
            <div id="flash1" class="death-flash"></div>
            <div class="ui"><b>PLAYER 1 (WASD)</b><br>Score: <span id="score1">0</span></div>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="viewport">
            <div id="flash2" class="death-flash"></div>
            <div class="ui"><b>PLAYER 2 (Arrows)</b><br>Score: <span id="score2">0</span></div>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <script>
        const c1 = document.getElementById('canvas1');
        const c2 = document.getElementById('canvas2');
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');

        const WORLD_SIZE = 2500;
        const keys = {};

        function resize() {
            c1.width = c2.width = window.innerWidth / 2;
            c1.height = c2.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        class Snake {
            constructor(x, y, color, controls, id) {
                this.startPos = {x, y};
                this.id = id;
                this.color = color;
                this.controls = controls;
                this.reset();
            }

            reset() {
                this.x = this.startPos.x;
                this.y = this.startPos.y;
                this.targetAngle = (this.id === 1) ? 0 : Math.PI;
                this.speed = 5;
                this.radius = 12;
                this.score = 0;
                this.segments = Array(20).fill({x: this.x, y: this.y});
                document.getElementById(`score${this.id}`).innerText = "0";
                
                // Visual feedback for death
                const flash = document.getElementById(`flash${this.id}`);
                flash.style.display = 'block';
                setTimeout(() => flash.style.display = 'none', 150);
            }

            update() {
                if (keys[this.controls.up]) this.targetAngle = -Math.PI / 2;
                if (keys[this.controls.down]) this.targetAngle = Math.PI / 2;
                if (keys[this.controls.left]) this.targetAngle = Math.PI;
                if (keys[this.controls.right]) this.targetAngle = 0;

                this.x += Math.cos(this.targetAngle) * this.speed;
                this.y += Math.sin(this.targetAngle) * this.speed;

                // 1. Boundary Death
                if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) {
                    this.reset();
                    return;
                }

                this.segments.unshift({x: this.x, y: this.y});
                const maxLength = 20 + Math.floor(this.score / 5);
                if (this.segments.length > maxLength) this.segments.pop();
            }

            draw(ctx, camX, camY) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.radius * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x - camX, this.segments[0].y - camY);
                for(let i=1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x - camX, this.segments[i].y - camY);
                }
                ctx.stroke();

                // Head
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x - camX, this.y - camY, this.radius * 0.7, 0, Math.PI*2);
                ctx.fill();
            }
        }

        const p1 = new Snake(300, 1250, '#4CAF50', {up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD'}, 1);
        const p2 = new Snake(2200, 1250, '#2196F3', {up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight'}, 2);
        
        let food = Array(100).fill(0).map(() => spawnFoodItem());

        function spawnFoodItem() {
            return {
                x: Math.random() * WORLD_SIZE, 
                y: Math.random() * WORLD_SIZE, 
                r: Math.random() * 4 + 3,
                c: `hsl(${Math.random()*360}, 100%, 60%)`
            };
        }

        function checkCollisions() {
            [p1, p2].forEach(p => {
                // Food collision
                food.forEach((f, i) => {
                    if (Math.hypot(p.x - f.x, p.y - f.y) < p.radius + f.r) {
                        p.score += 10;
                        document.getElementById(`score${p.id}`).innerText = p.score;
                        food[i] = spawnFoodItem();
                    }
                });

                // Snake vs Snake/Self collision
                const other = (p === p1) ? p2 : p1;
                
                // Check against other snake's body
                // We skip the first few segments of the head to prevent instant death from self-collision
                other.segments.forEach(seg => {
                    if (Math.hypot(p.x - seg.x, p.y - seg.y) < p.radius) {
                        p.reset();
                    }
                });

                // Check against own body (skip first 10 segments near head)
                for (let i = 15; i < p.segments.length; i++) {
                    if (Math.hypot(p.x - p.segments[i].x, p.y - p.segments[i].y) < p.radius) {
                        p.reset();
                    }
                }
            });
        }

        function renderView(ctx, player, canvas) {
            const camX = player.x - canvas.width / 2;
            const camY = player.y - canvas.height / 2;

            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#222';
            for(let x=0; x<=WORLD_SIZE; x+=100) {
                ctx.beginPath(); ctx.moveTo(x-camX, 0-camY); ctx.lineTo(x-camX, WORLD_SIZE-camY); ctx.stroke();
            }
            for(let y=0; y<=WORLD_SIZE; y+=100) {
                ctx.beginPath(); ctx.moveTo(0-camX, y-camY); ctx.lineTo(WORLD_SIZE-camX, y-camY); ctx.stroke();
            }
            
            // World Border
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 5;
            ctx.strokeRect(0-camX, 0-camY, WORLD_SIZE, WORLD_SIZE);

            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x - camX, f.y - camY, f.r, 0, Math.PI*2); ctx.fill();
            });

            p1.draw(ctx, camX, camY);
            p2.draw(ctx, camX, camY);
        }

        function loop() {
            p1.update();
            p2.update();
            checkCollisions();

            renderView(ctx1, p1, c1);
            renderView(ctx2, p2, c2);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
